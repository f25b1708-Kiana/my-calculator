<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Integration Calculator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .calculator-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            text-align: center;
            margin-top: 0;
            color: #2c3e50;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #4a5568;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.2);
        }
        .limits-row {
            display: flex;
            gap: 15px;
        }
        .limits-row .input-group {
            flex: 1;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #2b6cb0;
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #ebf8ff;
            border-left: 4px solid #3182ce;
            border-radius: 4px;
            display: none;
        }
        .error-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #fff5f5;
            border-left: 4px solid #e53e3e;
            border-radius: 4px;
            color: #c53030;
            display: none;
        }
        #math-output {
            font-size: 18px;
            margin-bottom: 10px;
            text-align: center;
        }
        #numeric-output {
            font-size: 22px;
            font-weight: bold;
            color: #2b6cb0;
            text-align: center;
        }
        .hint {
            font-size: 12px;
            color: #718096;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>Definite Integral Calculator</h2>
    
    <div class="input-group">
        <label for="function-input">Function $f(x)$</label>
        <input type="text" id="function-input" value="x^2 + sin(x)" placeholder="e.g., x^2 + 3*x">
        <div class="hint">Use standard notation like <code>x^2</code>, <code>sin(x)</code>, <code>exp(x)</code></div>
    </div>

    <div class="limits-row">
        <div class="input-group">
            <label for="lower-limit">Lower Limit ($a$)</label>
            <input type="number" id="lower-limit" value="0" step="any">
        </div>
        <div class="input-group">
            <label for="upper-limit">Upper Limit ($b$)</label>
            <input type="number" id="upper-limit" value="2" step="any">
        </div>
    </div>

    <button onclick="calculateIntegral()">Calculate</button>

    <div id="error-display" class="error-box"></div>
    <div id="result-display" class="result-box">
        <div id="math-output"></div>
        <div id="numeric-output"></div>
    </div>
</div>

<script>
    // Ensure KaTeX is loaded before doing an initial calculation display
    window.addEventListener('DOMContentLoaded', () => {
        calculateIntegral();
    });

    function calculateIntegral() {
        const resultDisplay = document.getElementById('result-display');
        const errorDisplay = document.getElementById('error-display');
        const mathOutput = document.getElementById('math-output');
        const numericOutput = document.getElementById('numeric-output');

        // Hide previous displays
        resultDisplay.style.display = 'none';
        errorDisplay.style.display = 'none';

        // Grab values
        const exprString = document.getElementById('function-input').value.trim();
        const a = parseFloat(document.getElementById('lower-limit').value);
        const b = parseFloat(document.getElementById('upper-limit').value);

        // Validation
        if (!exprString || isNaN(a) || isNaN(b)) {
            showError("Please fill out all fields with valid numbers.");
            return;
        }

        try {
            // Parse the expression using math.js
            const expr = math.compile(exprString);
            
            // Define the function for the integrator
            const f = (x) => expr.evaluate({ x: x });

            // Test if the function evaluates cleanly at the lower limit
            const testVal = f(a);
            if (typeof testVal !== 'number' || isNaN(testVal)) {
                throw new Error("The function could not be evaluated properly. Check your syntax.");
            }

            // Numerical Integration using the Trapezoidal Rule
            const n = 1000; // number of steps for high precision
            const h = (b - a) / n;
            let sum = 0.5 * (f(a) + f(b));

            for (let i = 1; i < n; i++) {
                sum += f(a + i * h);
            }
            const integralResult = sum * h;

            // Format result nicely (clean up floating point artifacts)
            const cleanResult = parseFloat(integralResult.toFixed(6));

            // Generate LaTeX string for display using KaTeX
            // Convert simple text powers to latex format for the preview icon
            let latexExpr = exprString
                .replace(/\*/g, '')
                .replace(/([a-zA-Z0-9]+)\^([a-zA-Z0-9]+)/g, '$1^$2');

            // Render Math Expression
            katex.render(`\\int_{${a}}^{${b}} (${latexExpr}) \\, dx`, mathOutput, {
                throwOnError: false
            });

            // Display Numeric Value
            numericOutput.innerText = `= ${cleanResult}`;
            resultDisplay.style.display = 'block';

        } catch (error) {
            showError(error.message || "An error occurred while calculating. Please check your math syntax.");
        }
    }

    function showError(message) {
        const errorDisplay = document.getElementById('error-display');
        errorDisplay.innerText = message;
        errorDisplay.style.display = 'block';
    }
</script>

</body>
</html>
